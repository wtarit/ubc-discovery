name: Deploy Backend

on:
  workflow_run:
    workflows: ["Build Backend Docker image"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "GHCR image tag to deploy"
        required: false
        default: latest

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
  ECS_SERVICE: ubc-discovery-backend-2b51
  CONTAINER_PORT: "8000"
  HEALTH_CHECK_PATH: /
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to ECS
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      ECS_EXECUTION_ROLE_ARN: ${{ secrets.ECS_EXECUTION_ROLE_ARN }}
      ECS_INFRASTRUCTURE_ROLE_ARN: ${{ secrets.ECS_INFRASTRUCTURE_ROLE_ARN }}
      ECS_TASK_ROLE_ARN: ${{ secrets.ECS_TASK_ROLE_ARN }}
      BACKEND_SECRETS_ARN: ${{ secrets.BACKEND_SECRETS_ARN }}

    steps:
      - name: Set deployment image
        id: image
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          MANUAL_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          IMAGE_TAG="${MANUAL_IMAGE_TAG:-sha-${WORKFLOW_RUN_SHA:-$GITHUB_SHA}}"
          IMAGE_NAME_LOWER="${IMAGE_NAME,,}"
          echo "uri=${REGISTRY}/${IMAGE_NAME_LOWER}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ECS Express service
        id: deploy
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          service-name: ${{ env.ECS_SERVICE }}
          image: ${{ steps.image.outputs.uri }}
          execution-role-arn: ${{ env.ECS_EXECUTION_ROLE_ARN }}
          infrastructure-role-arn: ${{ env.ECS_INFRASTRUCTURE_ROLE_ARN }}
          container-port: ${{ env.CONTAINER_PORT }}
          health-check-path: ${{ env.HEALTH_CHECK_PATH }}
          task-role-arn: ${{ env.ECS_TASK_ROLE_ARN }}
          environment-variables: |
            [
              {"name": "AWS_REGION", "value": ${{ toJSON(env.AWS_REGION) }}},
              {"name": "S3_BUCKET_NAME", "value": ${{ toJSON(vars.S3_BUCKET_NAME) }}},
              {"name": "S3_ENDPOINT_URL", "value": ${{ toJSON(vars.S3_ENDPOINT_URL) }}},
              {"name": "FIREBASE_PROJECT_ID", "value": ${{ toJSON(vars.FIREBASE_PROJECT_ID) }}},
              {"name": "BEDROCK_MODEL_ID", "value": ${{ toJSON(vars.BEDROCK_MODEL_ID) }}},
              {"name": "CORS_ALLOWED_ORIGINS", "value": ${{ toJSON(vars.CORS_ALLOWED_ORIGINS) }}}
            ]
          secrets: |
            [
              {"name": "DATABASE_URL", "valueFrom": "${{ env.BACKEND_SECRETS_ARN }}:DATABASE_URL::"},
              {"name": "FIREBASE_CREDENTIALS_JSON", "valueFrom": "${{ env.BACKEND_SECRETS_ARN }}:FIREBASE_CREDENTIALS_JSON::"},
              {"name": "ADMIN_API_KEY", "valueFrom": "${{ env.BACKEND_SECRETS_ARN }}:ADMIN_API_KEY::"}
            ]

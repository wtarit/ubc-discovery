name: Deploy Backend

on:
  workflow_run:
    workflows: ["Build Backend Docker image"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Public GHCR image tag to deploy"
        required: false
        default: latest

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to Lightsail
    runs-on: ubuntu-24.04
    environment: production
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    env:
      AWS_REGION: 'us-west-2'
      LIGHTSAIL_SERVICE_NAME: ${{ vars.LIGHTSAIL_SERVICE_NAME || 'ubc-discovery-backend' }}
      IMAGE_NAME: ${{ github.repository }}-backend

    steps:
      - name: Select immutable image
        id: image
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          MANUAL_IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_run" ]]; then
            image_tag="sha-${WORKFLOW_RUN_SHA}"
          else
            image_tag="${MANUAL_IMAGE_TAG:-latest}"
          fi

          image_name_lower="${IMAGE_NAME,,}"
          echo "uri=ghcr.io/${image_name_lower}:${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Lightsail
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
          APPENV_DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APPENV_FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          APPENV_FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          APPENV_ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
          APPENV_AWS_ACCESS_KEY_ID: ${{ secrets.BACKEND_AWS_ACCESS_KEY_ID }}
          APPENV_AWS_SECRET_ACCESS_KEY: ${{ secrets.BACKEND_AWS_SECRET_ACCESS_KEY }}
          APPENV_AWS_REGION: ${{ env.AWS_REGION }}
          APPENV_S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
          APPENV_S3_PUBLIC_BASE_URL: ${{ vars.S3_PUBLIC_BASE_URL }}
          APPENV_EMAIL_SENDER_EMAIL: ${{ vars.EMAIL_SENDER_EMAIL }}
          APPENV_CORS_ALLOWED_ORIGINS: ${{ vars.CORS_ALLOWED_ORIGINS }}
          APPENV_CORS_ALLOWED_ORIGIN_REGEX: ${{ vars.CORS_ALLOWED_ORIGIN_REGEX }}
        run: |
          test -n "$APPENV_DATABASE_URL"
          test -n "$APPENV_FIREBASE_CREDENTIALS_JSON"
          test -n "$APPENV_FIREBASE_PROJECT_ID"
          test -n "$APPENV_CORS_ALLOWED_ORIGINS"

          jq -n \
            --arg image "$IMAGE_URI" \
            '{
              backend: {
                image: $image,
                environment: (
                  env
                  | with_entries(select(.key | startswith("APPENV_")))
                  | with_entries(.key |= sub("^APPENV_"; ""))
                  | with_entries(select(.value != ""))
                ),
                ports: {"8000": "HTTP"}
              }
            }' > "$RUNNER_TEMP/containers.json"

          jq -n '{
            containerName: "backend",
            containerPort: 8000,
            healthCheck: {
              path: "/",
              intervalSeconds: 30,
              timeoutSeconds: 5,
              healthyThreshold: 2,
              unhealthyThreshold: 5,
              successCodes: "200"
            }
          }' > "$RUNNER_TEMP/public-endpoint.json"

          aws lightsail create-container-service-deployment \
            --region "$AWS_REGION" \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --containers "file://$RUNNER_TEMP/containers.json" \
            --public-endpoint "file://$RUNNER_TEMP/public-endpoint.json" \
            >/dev/null

      - name: Wait for deployment
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          for _ in $(seq 1 40); do
            read -r service_state deployment_state deployed_image next_state < <(
              aws lightsail get-container-services \
                --region "$AWS_REGION" \
                --service-name "$LIGHTSAIL_SERVICE_NAME" \
                --query 'containerServices[0].[state,currentDeployment.state,currentDeployment.containers.backend.image,nextDeployment.state]' \
                --output text
            )

            if [[ "$service_state" == "RUNNING" &&
                  "$deployment_state" == "ACTIVE" &&
                  "$deployed_image" == "$IMAGE_URI" ]]; then
              echo "Deployment is active."
              exit 0
            fi

            if [[ "$next_state" == "FAILED" ]]; then
              echo "Lightsail deployment failed." >&2
              exit 1
            fi

            sleep 15
          done

          echo "Timed out waiting for the Lightsail deployment." >&2
          exit 1

      - name: Show container logs after failure
        if: failure()
        run: |
          aws lightsail get-container-log \
            --region "$AWS_REGION" \
            --service-name "$LIGHTSAIL_SERVICE_NAME" \
            --container-name backend \
            --output text || true
